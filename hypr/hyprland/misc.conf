misc {
    vrr = 0

    animate_manual_resizes = false
    animate_mouse_windowdragging = false

    disable_hyprland_logo = true
    force_default_wallpaper = 0

    on_focus_under_fullscreen = 2
    allow_session_lock_restore = true
    middle_click_paste = true
    focus_on_activate = true
    initial_workspace_tracking = 0  # open windows on the CURRENT workspace, not the one the launching process started on (fixes apps landing on ws1, esp. uwsm/dbus-launched ones)
    session_lock_xray = true

    mouse_move_enables_dpms = true
    key_press_enables_dpms = true

	background_color = rgb($surfaceContainer)
}

debug {
    error_position = 1
}
